<div class="auth-container">
  <div class="auth-card" style="max-width: 550px;">
    <div class="logo-section">
      <div class="logo-icon">
        <i class="fa-solid fa-users"></i>
      </div>
      <h2>EventZen</h2>
      <p>Create your account</p>
    </div>

    <div *ngIf="errorMessage" class="error-alert">
      <i class="fa-solid fa-circle-exclamation"></i> {{ errorMessage }}
    </div>

    <div *ngIf="successMessage" class="success-alert" style="background: #dcfce7; color: #16a34a; padding: 12px 15px; border-radius: 10px; font-size: 13px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
      <i class="fa-solid fa-circle-check"></i> {{ successMessage }}
    </div>

    <form (ngSubmit)="onSignup()" #signupForm="ngForm" class="auth-form">
      
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div class="form-group">
          <label>First Name</label>
          <div class="input-wrapper">
            <i class="fa-regular fa-user"></i>
            <input type="text" name="firstName" [(ngModel)]="signupData.firstName" required placeholder="John">
          </div>
        </div>

        <div class="form-group">
          <label>Last Name</label>
          <div class="input-wrapper">
            <i class="fa-regular fa-user"></i>
            <input type="text" name="lastName" [(ngModel)]="signupData.lastName" required placeholder="Doe">
          </div>
        </div>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrapper">
          <i class="fa-regular fa-envelope"></i>
          <input type="email" name="email" [(ngModel)]="signupData.email" required placeholder="john@example.com">
        </div>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div class="form-group">
          <label>Phone Number</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-phone"></i>
            <input type="tel" name="phone" [(ngModel)]="signupData.phone" required placeholder="123-456-7890">
          </div>
        </div>

        <div class="form-group">
          <label>Account Role</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-user-tag"></i>
            <select name="role" [(ngModel)]="signupData.role" required>
              <option value="STUDENT">Student</option>
              <option value="VOLUNTEER">Volunteer</option>
              <option value="ORGANIZER">Organizer (Admin)</option>
            </select>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-lock"></i>
          <input type="password" name="password" [(ngModel)]="signupData.password" required placeholder="Create a strong password">
        </div>
      </div>

      <button type="submit" class="primary-btn" [disabled]="!signupForm.form.valid || isLoading">
        <span *ngIf="!isLoading">Create Account</span>
        <span *ngIf="isLoading"><i class="fa-solid fa-spinner fa-spin"></i> Creating Account...</span>
      </button>

    </form>

    <p class="switch-link">Already have an account? <a routerLink="/login">Sign in here</a></p>
  </div>
</div>
