<div class="auth-container">
  <div class="auth-card">
    <div class="logo-section">
      <div class="logo-icon">
        <i class="fa-solid fa-users"></i>
      </div>
      <h2>EventZen</h2>
      <p>Volunteer Event Management System</p>
    </div>

    <h3>Welcome Back! 👋</h3>
    <p class="subtitle">Please enter your details to sign in.</p>

    <div *ngIf="errorMessage" class="error-alert">
      <i class="fa-solid fa-circle-exclamation"></i> {{ errorMessage }}
    </div>

    <form (ngSubmit)="onLogin()" #loginForm="ngForm" class="auth-form">
      
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrapper">
          <i class="fa-regular fa-envelope"></i>
          <input type="email" name="email" [(ngModel)]="loginData.email" required placeholder="Enter your email">
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-lock"></i>
          <input type="password" name="password" [(ngModel)]="loginData.password" required placeholder="Enter your password">
        </div>
      </div>

      <button type="submit" class="primary-btn" [disabled]="!loginForm.form.valid || isLoading">
        <span *ngIf="!isLoading">Sign In</span>
        <span *ngIf="isLoading"><i class="fa-solid fa-spinner fa-spin"></i> Signing In...</span>
      </button>

    </form>

    <p class="switch-link">Don't have an account? <a routerLink="/signup">Sign up here</a></p>
  </div>
</div>
